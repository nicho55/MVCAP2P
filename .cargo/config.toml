# Linker rápido (mold via clang) para todos os builds neste host.
# NÃO colocamos target-cpu=native aqui: afetaria o release e geraria um binário
# atrelado a esta CPU (Ryzen 5700/AVX2), que pode dar SIGILL noutra máquina.
[build]
rustc-wrapper = "sccache"

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]
