# cargo-deny — licenças, vulnerabilidades e duplicatas.
# Uso: cargo deny check

[graph]
all-features = true

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"

[advisories]
yanked = "warn"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
