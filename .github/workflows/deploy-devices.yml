name: deploy-devices

# Lança uma versão nos celulares físicos.
#  - build: roda na nuvem do GitHub (ubuntu-latest), gera o APK.
#  - deploy: roda no SEU self-hosted runner (label android-farm), com os
#    celulares plugados/conectados via adb, instala e mede desempenho.
#  - check: analisa os relatórios e cria issue de regressão se KPIs falharem.
on:
  push:
    branches: [main]             # testar a cada push em main
    tags: ['v*']                 # criar tag v0.2.0 = lançar versão
  pull_request:
    branches: [main]             # testar PRs antes de mergear
  workflow_dispatch:             # ou botão "Run workflow" no site
    inputs:
      launch_seconds:
        description: 'segundos rodando em cada aparelho p/ medir fps'
        default: '20'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Versão do Rust + target Android vêm do rust-toolchain.toml (fonte única).
      - name: Rust pinado (rust-toolchain.toml)
        run: rustup show

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Instalar NDK 28.2.13676358 + cargo-ndk
        run: |
          sdkmanager --install "ndk;28.2.13676358"
          cargo install cargo-ndk --locked

      - name: Compilar lib nativa (cargo-ndk)
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/28.2.13676358
        run: |
          cargo ndk -t arm64-v8a -P 24 \
            -o app/android/app/src/main/jniLibs \
            build --release -p tabletop

      - name: Montar APK (gradle)
        run: cd app/android && mkdir -p build/tmp && ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: app/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: [self-hosted, android-farm]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          name: apk
          path: app/android/app/build/outputs/apk/debug/

      - name: Reconectar J7 via WiFi (se J7_IP estiver definido)
        if: ${{ vars.J7_IP != '' }}
        run: adb connect ${{ vars.J7_IP }}:5555 || true

      - name: Reconectar MG06 via WiFi (se MG06_IP estiver definido)
        if: ${{ vars.MG06_IP != '' }}
        run: adb connect ${{ vars.MG06_IP }}:5555 || true

      - name: Instalar + medir em todos os celulares
        run: LAUNCH_SECONDS='${{ inputs.launch_seconds || 20 }}' ./scripts/deploy-farm.sh

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: perf-reports
          path: reports/

  check:
    needs: deploy
    if: always() && needs.deploy.result != 'skipped'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: perf-reports
          path: reports/

      - name: Verificar KPIs e criar issue se falhar
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAX_RAM_MB: 600
          MIN_FPS: 30
        run: |
          FAILED=false
          BODY="## Regressão de Performance Detectada\n\n"
          BODY+="**Commit:** ${{ github.sha }}\n"
          BODY+="**Ref:** ${{ github.ref }}\n\n"

          for report in reports/*.txt; do
            [ -f "$report" ] || continue
            device=$(head -1 "$report" | grep -oP 'model=\K[^ ]+' || echo "unknown")

            # Extrair RAM (TOTAL linha do meminfo)
            ram_kb=$(grep -oP 'TOTAL[:\s]+\K[0-9]+' "$report" | head -1 || echo "0")
            ram_mb=$((ram_kb / 1024))

            # Extrair frames do gfxinfo
            total_frames=$(grep -oP 'Total frames rendered: \K[0-9]+' "$report" || echo "0")

            BODY+="### $device\n"
            BODY+="- RAM: ${ram_mb} MB (limite: ${MAX_RAM_MB} MB)\n"
            BODY+="- Frames: ${total_frames}\n"

            if [ "$ram_mb" -gt "$MAX_RAM_MB" ] 2>/dev/null; then
              BODY+="- **FALHA: RAM excede ${MAX_RAM_MB} MB**\n"
              FAILED=true
            fi

            BODY+="\n"
          done

          if [ "$FAILED" = "true" ]; then
            echo "$BODY" > /tmp/issue_body.md
            gh issue create \
              --repo "${{ github.repository }}" \
              --title "[QA] Regressão de Performance — $(date +%Y-%m-%d)" \
              --body "$(echo -e "$BODY")" \
              --label "bug,prio:P0,area:infra"
            echo "::error::KPIs falharam — issue de regressão criada."
            exit 1
          else
            echo "✅ Todos os KPIs dentro dos limites."
          fi
