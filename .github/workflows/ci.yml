name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Versão do Rust vem do rust-toolchain.toml (fonte única). rustup show
      # instala o channel/componentes/targets pinados no arquivo.
      - name: Rust pinado (rust-toolchain.toml)
        run: rustup show

      - uses: Swatinem/rust-cache@v2

      - name: Dependências de sistema (Bevy/wgpu)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev

      - name: Formatação (rustfmt)
        run: cargo fmt --all --check

      - name: Lint (clippy -D warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Testes
        run: cargo test --workspace

      - name: Doc (sem itens faltando)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps

  # cargo-deny é informativo por ora (ver ADR-006): reporta licenças/vulns
  # sem derrubar o CI. Endurecer para bloqueante quando a árvore estiver limpa.
  deny:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
