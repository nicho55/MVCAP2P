<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <style>
      .phone{fill:#1a1a2e;stroke:#444;stroke-width:2;rx:14}
      .lbl{font-family:sans-serif;font-size:9px;fill:#777;text-anchor:middle}
      .title{font-family:sans-serif;font-size:13px;fill:#fff;font-weight:bold;text-anchor:middle}
      .sub{font-family:sans-serif;font-size:10px;fill:#999;text-anchor:middle}
      .cfg{fill:#3a3a5a;stroke:#7777cc;stroke-width:1.5}
      .insp{fill:#1e2d1e;stroke:#44aa44;stroke-width:1.5;rx:6}
      .jzone{fill:none;stroke:#aa5555;stroke-width:1;stroke-dasharray:4 2}
      .jknob{fill:#3a2a2a;stroke:#cc6666;stroke-width:2}
      .tbtn{fill:#2a2a4a;stroke:#6666cc;stroke-width:1.5}
      .tbtn-on{fill:#3a3a7a;stroke:#8888ff;stroke-width:2}
      .ttrack{fill:#222;stroke:#555;stroke-width:1;rx:10}
      .smenu{fill:#2a2a4a;stroke:#8888ff;stroke-width:1.5;rx:8}
      .sitem{fill:#333366;stroke:#6666cc;stroke-width:1;rx:4}
      .dot{fill:#555}.dot-on{fill:#8888ff}
      .t{font-family:sans-serif;font-size:10px;fill:#ccc;text-anchor:middle;dominant-baseline:central}
      .n{font-family:sans-serif;font-size:12px;fill:#8888ff;text-anchor:middle;dominant-baseline:central;font-weight:bold}
      .mt{font-family:sans-serif;font-size:9px;fill:#ddd;text-anchor:start;dominant-baseline:central}
      .mi{font-family:sans-serif;font-size:11px;fill:#8888ff;text-anchor:middle;dominant-baseline:central}
      .hint{font-family:sans-serif;font-size:8px;fill:#666;text-anchor:middle;font-style:italic}
      .add{fill:#2a4a2a;stroke:#66cc66;stroke-width:1.5;rx:6}
    </style>
  </defs>

  <text x="400" y="18" class="title">Toolbar com Submenu — Landscape</text>
  <text x="400" y="34" class="sub">(toque na tool abre submenu para cima; carousel desliza &#9664; para mais)</text>

  <!-- Phone -->
  <rect x="40" y="42" width="720" height="370" class="phone"/>

  <!-- (2) Config — top right -->
  <circle cx="730" cy="62" r="16" class="cfg"/>
  <text x="730" y="62" class="t">&#9881;</text>

  <!-- (1) Inspector collapsed — top center -->
  <rect x="280" y="48" width="240" height="45" class="insp"/>
  <text x="320" y="66" class="t" style="font-size:9px">HP 45</text>
  <text x="370" y="66" class="t" style="font-size:9px">AC 16</text>
  <text x="420" y="66" class="t" style="font-size:9px">&#9876;</text>

  <!-- (4) Toolbar — bottom center -->
  <rect x="230" y="355" width="300" height="50" class="ttrack"/>

  <!-- Tool 1 — active, submenu open -->
  <circle cx="270" cy="380" r="18" class="tbtn-on"/>
  <text x="270" y="380" class="mi">&#9881;</text>

  <!-- Tool 2 -->
  <circle cx="330" cy="380" r="18" class="tbtn"/>
  <text x="330" y="380" class="n">4</text>

  <!-- Tool 3 -->
  <circle cx="390" cy="380" r="18" class="tbtn"/>
  <text x="390" y="380" class="n">4</text>

  <!-- Tool 4 -->
  <circle cx="450" cy="380" r="18" class="tbtn"/>
  <text x="450" y="380" class="n">4</text>

  <!-- Carousel arrow + dots -->
  <text x="500" y="380" class="t" style="font-size:12px;fill:#666">&#9664;</text>
  <circle cx="490" cy="360" r="2.5" class="dot-on"/>
  <circle cx="498" cy="360" r="2.5" class="dot"/>
  <circle cx="506" cy="360" r="2.5" class="dot"/>

  <!-- Submenu expanding UPWARD from active tool -->
  <rect x="210" y="200" width="180" height="145" class="smenu"/>

  <!-- Submenu title -->
  <text x="225" y="218" class="mt" style="font-weight:bold;fill:#8888ff">&#9881; Terreno (GM only)</text>

  <rect x="220" y="226" width="160" height="26" class="sitem"/>
  <text x="240" y="239" class="mi" style="font-size:10px">&#9632;</text>
  <text x="255" y="239" class="mt">Pintar Grama</text>

  <rect x="220" y="256" width="160" height="26" class="sitem"/>
  <text x="240" y="269" class="mi" style="font-size:10px">&#9650;</text>
  <text x="255" y="269" class="mt">Elevar Terreno</text>

  <rect x="220" y="286" width="160" height="26" class="sitem"/>
  <text x="240" y="299" class="mi" style="font-size:10px">&#9646;</text>
  <text x="255" y="299" class="mt">Pintar Pedra</text>

  <rect x="220" y="316" width="160" height="26" class="sitem"/>
  <text x="240" y="329" class="mi" style="font-size:10px">&#10006;</text>
  <text x="255" y="329" class="mt">Borracha</text>

  <!-- Arrow connecting submenu to tool -->
  <line x1="270" y1="345" x2="270" y2="360" stroke="#8888ff" stroke-width="1.5"/>

  <!-- (3) Joystick — bottom right -->
  <circle cx="670" cy="340" r="55" class="jzone"/>
  <circle cx="670" cy="340" r="24" class="jknob"/>
  <text x="670" y="340" class="t">L</text>

  <!-- Drag-to-add hint -->
  <rect x="540" y="200" width="200" height="80" fill="none" stroke="#555" stroke-width:1 stroke-dasharray="4 2" rx="6"/>
  <text x="640" y="218" class="sub" style="font-size:9px">Drag-right-to-add:</text>
  <text x="640" y="234" class="hint">1. Arraste toolbar para DIREITA</text>
  <text x="640" y="248" class="hint">2. Continue ate o limite</text>
  <text x="640" y="262" class="hint">3. Botao [+] aparece</text>
  <rect x="610" y="268" width="55" height="18" class="add"/>
  <text x="637" y="277" class="t" style="font-size:9px;fill:#66cc66;font-weight:bold">+ Add</text>
</svg>
